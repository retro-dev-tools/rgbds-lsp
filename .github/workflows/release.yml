name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  prebuild:
    name: Prebuild ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-13
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: packages/tree-sitter-rgbds
        run: npm install

      - name: Build prebuilds
        working-directory: packages/tree-sitter-rgbds
        run: npx prebuildify --napi --strip

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}
          path: packages/tree-sitter-rgbds/prebuilds/

  publish-npm:
    name: Publish to npm
    needs: prebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: packages/tree-sitter-rgbds/prebuilds/
          merge-multiple: true

      - name: List prebuilds
        run: find packages/tree-sitter-rgbds/prebuilds/ -type f

      - name: Install dependencies
        run: npm install

      - name: Publish tree-sitter-rgbds
        working-directory: packages/tree-sitter-rgbds
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build server
        working-directory: packages/server
        run: npx tsc -p tsconfig.json

      - name: Publish rgbds-language-server
        working-directory: packages/server
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build all
        run: npm run build

      - name: Package and publish
        working-directory: packages/vscode
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build all
        run: npm run build

      - name: Package VSIX
        working-directory: packages/vscode
        run: npx @vscode/vsce package -o rgbds-lsp.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/vscode/rgbds-lsp.vsix
          generate_release_notes: true
